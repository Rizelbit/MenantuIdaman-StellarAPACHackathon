name: Kirimin
description: "Northstar-Stellar Based Digital Wallet Mobile Application in ASEAN Countries"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0

  # Passkey native (iOS AuthenticationServices / Android Credential Manager).
  # PIN versi yang terbukti jalan saat integrasi — API package ini masih berkembang.
  passkeys: ^2.4.0

  # Networking
  dio: ^5.5.0

  # Formatting Rp / $ / tanggal (locale id_ID)
  intl: ^0.20.3

  # OPSIONAL: fallback UX biometrik saja (BUKAN pengganti passkey/secp256r1)
  local_auth: ^3.0.2

  # Ikon
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  fonts:
    # Manrope is the app's sole typeface (design system v1.1 — Inter fully
    # retired) — bundled offline, one variable-font file, many weights.
    - family: Manrope
      fonts:
        - asset: lib/assets/fonts/Manrope-VariableFont_wght.ttf
          weight: 400
        - asset: lib/assets/fonts/Manrope-VariableFont_wght.ttf
          weight: 500
        - asset: lib/assets/fonts/Manrope-VariableFont_wght.ttf
          weight: 600
        - asset: lib/assets/fonts/Manrope-VariableFont_wght.ttf
          weight: 700
        - asset: lib/assets/fonts/Manrope-VariableFont_wght.ttf
          weight: 800

flutter_launcher_icons:  
  android: true
  ios: true
  macos:
    generate: true
    image_path: "lib/assets/icon/Kirimin.png"
  windows:
    generate: true
    image_path: "lib/assets/icon/Kirimin.png"
    iconsize: 48
  image_path: "lib/assets/icon/Kirimin.png"