name: kirimin
description: "Invisible crypto remittance — kirim uang ke keluarga, cukup pakai Face ID."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Passkey native (iOS AuthenticationServices / Android Credential Manager).
  # PIN versi yang terbukti jalan saat integrasi — API package ini masih berkembang.
  passkeys: ^2.4.0

  # Networking
  dio: ^5.5.0

  # Formatting Rp / $ / tanggal (locale id_ID)
  intl: ^0.19.0

  # OPSIONAL: fallback UX biometrik saja (BUKAN pengganti passkey/secp256r1)
  local_auth: ^2.2.0

  # Ikon
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  # fonts di-load via google_fonts atau bundle manual — lihat app/theme.dart
